{% extends 'base.html' %}

{% block title %}{% if mode == 'create' %}Новый товар{% else %}Редактирование товара{% endif %}{% endblock %}

<h1>{% if mode == 'create' %}Новый товар{% else %}Редактирование товара{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit">
        {% if mode == 'create' %}Создать{% else %}Сохранить{% endif %}
    </button>
    <a href="{% url 'product_list' %}">Отмена</a>
</form>
{% endblock %}
